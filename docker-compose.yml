services:
  # PostgreSQL + TimescaleDB
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: buildwise-db
    environment:
      POSTGRES_DB: buildwise
      POSTGRES_USER: buildwise
      POSTGRES_PASSWORD: buildwise_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (Celery broker + cache)
  redis:
    image: redis:7-alpine
    container_name: buildwise-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./buildwise-backend
      dockerfile: Dockerfile
    container_name: buildwise-backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://buildwise:buildwise_dev@db:5432/buildwise
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      # AI (Claude API for natural language building generation)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Auth0 (uncomment to enable JWT auth instead of dev X-User-Id)
      # AUTH0_DOMAIN: "your-tenant.auth0.com"
      # AUTH0_CLIENT_ID: "your-client-id"
      # AUTH0_API_AUDIENCE: "https://api.buildwise.ai"
      PYTHONPATH: /app
    volumes:
      - ./buildwise-backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Celery worker (simulation task processing) — includes EnergyPlus binary
  worker:
    build:
      context: ./buildwise-backend
      dockerfile: Dockerfile.worker
    container_name: buildwise-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://buildwise:buildwise_dev@db:5432/buildwise
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      SIMULATION_MODE: "mock"  # "mock"=eplustbl lookup (MVP), "real"=EnergyPlus (requires all strategies supported)
      PYTHONPATH: /app
      BUILDWISE_EPW_DIR: /opt/weather
      EMS_SIMULATION_ROOT: /opt/ems_simulation
    volumes:
      - ./buildwise-backend:/app
      - ./energyplus/weather:/opt/weather:ro
      - ../ems_simulation:/opt/ems_simulation
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.worker:celery_app", "worker", "--loglevel=info", "-Q", "simulation", "--concurrency=2"]

  # Frontend (nginx + SPA) — use `docker compose --profile frontend up` or run `npm run dev` locally
  frontend:
    build:
      context: ./buildwise-frontend
      dockerfile: Dockerfile
    container_name: buildwise-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - frontend

  # EnergyPlus (시뮬레이션 엔진) — `docker compose --profile energyplus up`
  energyplus:
    build:
      context: ./energyplus
      dockerfile: Dockerfile
    container_name: buildwise-energyplus
    volumes:
      - ./energyplus/weather:/opt/weather:ro
      - ep-workdir:/opt/workdir
    environment:
      WEATHER_DIR: /opt/weather
      WORK_DIR: /opt/workdir
    profiles:
      - energyplus

volumes:
  pgdata:
  ep-workdir:
