version: "3.9"

services:
  # PostgreSQL + TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: buildwise-db
    environment:
      POSTGRES_DB: buildwise
      POSTGRES_USER: buildwise
      POSTGRES_PASSWORD: buildwise_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schemas/database.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (Celery broker + cache)
  redis:
    image: redis:7-alpine
    container_name: buildwise-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (optional - can also run locally with uvicorn)
  backend:
    build:
      context: ./buildwise-backend
      dockerfile: Dockerfile
    container_name: buildwise-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://buildwise:buildwise_dev@db:5432/buildwise
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  # Frontend (nginx + SPA)
  frontend:
    build:
      context: ./buildwise-frontend
      dockerfile: Dockerfile
    container_name: buildwise-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    profiles:
      - full

  # EnergyPlus (시뮬레이션 엔진)
  energyplus:
    build:
      context: ./energyplus
      dockerfile: Dockerfile
    container_name: buildwise-energyplus
    volumes:
      - ./energyplus/weather:/opt/weather:ro
      - ep-workdir:/opt/workdir
    environment:
      WEATHER_DIR: /opt/weather
      WORK_DIR: /opt/workdir

volumes:
  pgdata:
  ep-workdir:
