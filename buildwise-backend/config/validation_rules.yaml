# =============================================================================
# Severity Levels
# =============================================================================
severity_levels:
  error:
    description: "Abort required. Simulation results invalid."
    action: "abort"
  warning:
    description: "Review required. Results may be usable."
    action: "log_and_continue"
  info:
    description: "Informational. Within normal range."
    action: "log"
